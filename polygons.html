<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Infinite Polygon Names</title>
  <style>
    body {
      background: #111;
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 { font-size: 3rem; margin: 0.2em 0; text-align: center; }
    h2 { font-size: 1.5rem; margin: 0.2em 0; color: #aaa; }
  </style>
</head>
<body>
  <h2 id="sides">3 sides</h2>
  <h1 id="name">Triangle</h1>

  <script>
    let n = 3n;

    const ones = {
      1: "hen", 2: "di", 3: "tri", 4: "tetra", 5: "penta",
      6: "hexa", 7: "hepta", 8: "octa", 9: "ennea"
    };

    const tens = {
      10: "deca", 20: "icosa", 30: "triaconta", 40: "tetraconta",
      50: "pentaconta", 60: "hexaconta", 70: "heptaconta",
      80: "octaconta", 90: "enneaconta"
    };

    const hundreds = {
      100: "hecta", 200: "dicta", 300: "tricta", 400: "tetracta",
      500: "pentacta", 600: "hexacta", 700: "heptacta",
      800: "octacta", 900: "enneacta"
    };

    const thousands = {
      1000: "chilia", 2000: "dichilia", 3000: "trichilia",
      4000: "tetrachilia", 5000: "pentachilia", 6000: "hexachilia",
      7000: "heptachilia", 8000: "octachilia", 9000: "enneachilia"
    };

    function prettyNameForSmall(num) {
      if (num <= 20) {
        const special = {
          3: "Triangle", 4: "Quadrilateral", 5: "Pentagon",
          6: "Hexagon", 7: "Heptagon", 8: "Octagon",
          9: "Nonagon", 10: "Decagon", 11: "Hendecagon",
          12: "Dodecagon", 13: "Tridecagon", 14: "Tetradecagon",
          15: "Pentadecagon", 16: "Hexadecagon", 17: "Heptadecagon",
          18: "Octadecagon", 19: "Enneadecagon", 20: "Icosagon"
        };
        return special[num];
      }

      let name = "";
      let n = num;

      if (n >= 1000) {
        let t = Math.floor(n / 1000) * 1000;
        if (thousands[t]) name += thousands[t];
        n %= 1000;
      }

      if (n >= 100) {
        let h = Math.floor(n / 100) * 100;
        if (hundreds[h]) name += hundreds[h];
        n %= 100;
      }

      if (n >= 20) {
        let t = Math.floor(n / 10) * 10;
        if (tens[t]) name += tens[t];
        n %= 10;
      }

      if (name && n > 0) name += "kai";

      if (n > 0 && ones[n]) name += ones[n];

      return name + "gon";
    }

    function polygonName(big) {
      const num = Number(big);

      // For huge numbers (like millions), just use N-gon
      if (!Number.isSafeInteger(num) || num >= 10000) {
        return big.toString() + "-gon";
      }

      return prettyNameForSmall(num);
    }

    function update() {
      document.getElementById("sides").textContent = n.toString() + " sides";
      document.getElementById("name").textContent = polygonName(n);
      n += 1n;
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
